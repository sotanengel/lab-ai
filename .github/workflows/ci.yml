name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint / Typecheck / Test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Takumi Guard (full protection)
        if: ${{ vars.TAKUMI_BOT_ID != '' }}
        uses: flatt-security/setup-takumi-guard-npm@v1
        with:
          bot-id: ${{ vars.TAKUMI_BOT_ID }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Biome lint & format
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Vitest
        run: pnpm run test

      - name: Vitest coverage (services ≥ 70%)
        run: pnpm run coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: apps/api/coverage/**
          if-no-files-found: ignore
          retention-days: 7

  docker-smoke:
    name: Docker build smoke
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Takumi Guard (full protection)
        if: ${{ vars.TAKUMI_BOT_ID != '' }}
        uses: flatt-security/setup-takumi-guard-npm@v1
        with:
          bot-id: ${{ vars.TAKUMI_BOT_ID }}

      - uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          load: true
          push: false
          tags: lab-ai/api:ci

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.web
          load: true
          push: false
          tags: lab-ai/web:ci

      - name: Build MCP image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.mcp
          load: true
          push: false
          tags: lab-ai/mcp:ci
